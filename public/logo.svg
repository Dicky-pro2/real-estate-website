<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6; stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)" />

  <!-- Building bars -->
  <rect x="65" y="85" width="15" height="45" fill="white" opacity="0.9"/>
  <rect x="85" y="70" width="15" height="60" fill="white" opacity="0.95"/>
  <rect x="105" y="95" width="15" height="35" fill="white" opacity="0.85"/>

  <!-- Roof shape -->
  <polygon points="60,85 100,55 140,85" fill="white"/>

  <!-- Door -->
  <rect x="93" y="105" width="14" height="25" fill="#0f172a"/>

  <!-- Subtle shadow -->
  <ellipse cx="100" cy="140" rx="35" ry="8" fill="black" opacity="0.2"/>
</svg>